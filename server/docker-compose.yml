# FoodPrint 私有 DB（自架）— PostgreSQL + 店家/照片接收服務
#
# 啟動：
#   cd server
#   cp .env.example .env          # 改掉密碼與 token
#   docker compose up -d --build
#
# 之後在 Claude 端把 backend 指向 http://<這台機器的內網IP>:8000：
#   python3 scripts/backend.py set --backend selfhost \
#       --base-url http://192.168.x.x:8000 --token <你的讀寫 token>
#
# 資料持久化在 named volume（pgdata：Postgres；media：店家照片+縮圖）。
#
# name：固定 compose 專案名為 foodprint，不靠目錄名推斷。
#   否則放在叫 server/ 的目錄時，專案名會變 "server"，可能跟同機其他也住在
#   server/ 的專案（例如 poseplanner）共用同一組容器 / volume（server_pgdata…），
#   一邊的 `docker compose down -v` 會把另一邊的資料一起刪掉。固定成 foodprint
#   後，volume 是 foodprint_pgdata / foodprint_media、容器是 foodprint-db-1…，互不干擾。
name: foodprint

services:
  db:
    image: postgres:16
    restart: unless-stopped
    # 停用 unix domain socket：在 Proxmox 非特權 LXC 裡跑 Docker 時，AppArmor/seccomp
    # 會擋掉 AF_UNIX 的 bind()。api 與 healthcheck 都走 TCP，不需要 unix socket。一般主機也無害。
    command: ["-c", "unix_socket_directories="]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodprint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodprint}
      POSTGRES_DB: ${POSTGRES_DB:-foodprint}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:-foodprint} -d ${POSTGRES_DB:-foodprint}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # 預設不對外開 5432（只在 compose 內網給 api 用）。

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-foodprint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodprint}
      POSTGRES_DB: ${POSTGRES_DB:-foodprint}
      FOODPRINT_TOKEN: ${FOODPRINT_TOKEN:-}
      FOODPRINT_READ_TOKEN: ${FOODPRINT_READ_TOKEN:-}
      FOODPRINT_CORS_ORIGINS: ${FOODPRINT_CORS_ORIGINS:-*}
      FOODPRINT_DATA: /data
      # /skill 即時打包用的 repo 根（下方以唯讀掛入）。
      FOODPRINT_REPO: /repo
      # /skill 下載額外放行的來源網段（VPN 等），逗號分隔 CIDR；預設只放私網 + loopback。
      FOODPRINT_SKILL_ALLOW_CIDRS: ${FOODPRINT_SKILL_ALLOW_CIDRS:-}
    volumes:
      - media:/data
      # taxonomy.yaml 掛進 /app（seed / 判定 active 用）。
      - ../taxonomy.yaml:/app/taxonomy.yaml:ro
      # repo 根唯讀掛入：供 GET /skill 即時打包（SKILL.md / scripts）。
      - ../:/repo:ro
    ports:
      - "${API_PORT:-8000}:8000"

  # 地圖前端（Nuxt 3 SSR；見 ../web/）。
  # Nuxt 的 server route（/api/*）把 /stats、/search、/nearby、縮圖代理到 api 並在
  # server 端注入讀取 token，所以瀏覽器端免持 token、同源免設 CORS。寫入端點不經此代理。
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # 後端 domain：compose 內網直接打服務名 api:8000（容器內的 localhost 是容器自己）。
      NUXT_FOODPRINT_BASE_URL: http://api:8000
      # 『讀取』token（由 install.sh 從 .env 推導寫入 FOODPRINT_PROXY_TOKEN）；只在 server 端用。
      NUXT_FOODPRINT_TOKEN: ${FOODPRINT_PROXY_TOKEN:-}
    ports:
      - "${WEB_PORT:-8080}:3000"

volumes:
  pgdata:
  media:
