# FoodPrint 私有 DB（自架）— PostgreSQL + 店家/照片接收服務
#
# 啟動：
#   cd server
#   cp .env.example .env          # 改掉密碼與 token
#   docker compose up -d --build
#
# 之後在 Claude 端把 backend 指向 http://<這台機器的內網IP>:8000：
#   python3 scripts/backend.py set --backend selfhost \
#       --base-url http://192.168.x.x:8000 --token <你的讀寫 token>
#
# 資料持久化在 named volume（pgdata：Postgres；media：店家照片+縮圖）。

services:
  db:
    image: postgres:16
    restart: unless-stopped
    # 停用 unix domain socket：在 Proxmox 非特權 LXC 裡跑 Docker 時，AppArmor/seccomp
    # 會擋掉 AF_UNIX 的 bind()。api 與 healthcheck 都走 TCP，不需要 unix socket。一般主機也無害。
    command: ["-c", "unix_socket_directories="]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodprint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodprint}
      POSTGRES_DB: ${POSTGRES_DB:-foodprint}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:-foodprint} -d ${POSTGRES_DB:-foodprint}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # 預設不對外開 5432（只在 compose 內網給 api 用）。

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-foodprint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodprint}
      POSTGRES_DB: ${POSTGRES_DB:-foodprint}
      FOODPRINT_TOKEN: ${FOODPRINT_TOKEN:-}
      FOODPRINT_READ_TOKEN: ${FOODPRINT_READ_TOKEN:-}
      FOODPRINT_CORS_ORIGINS: ${FOODPRINT_CORS_ORIGINS:-*}
      FOODPRINT_DATA: /data
      # /skill 即時打包用的 repo 根（下方以唯讀掛入）。
      FOODPRINT_REPO: /repo
      # /skill 下載額外放行的來源網段（VPN 等），逗號分隔 CIDR；預設只放私網 + loopback。
      FOODPRINT_SKILL_ALLOW_CIDRS: ${FOODPRINT_SKILL_ALLOW_CIDRS:-}
    volumes:
      - media:/data
      # taxonomy.yaml 掛進 /app（seed / 判定 active 用）。
      - ../taxonomy.yaml:/app/taxonomy.yaml:ro
      # repo 根唯讀掛入：供 GET /skill 即時打包（SKILL.md / scripts）。
      - ../:/repo:ro
    ports:
      - "${API_PORT:-8000}:8000"

  # 地圖前端（靜態 SPA + nginx 唯讀反向代理；見 ../web/）。
  # nginx 把 /api/{stats,search,nearby,thumbs} 代理到 api 並注入讀取 token，
  # 所以瀏覽器端免持 token、免設 CORS。寫入端點不經此代理。
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # 注入給 nginx 代理的讀取 token（由 install.sh 從 .env 推導寫入）。
      FOODPRINT_PROXY_TOKEN: ${FOODPRINT_PROXY_TOKEN:-}
      # 只讓 envsubst 替換我們的變數，保留 nginx 內建 $uri/$host/$args/$1 等。
      NGINX_ENVSUBST_FILTER: "FOODPRINT_PROXY_TOKEN"
    volumes:
      - ../web/public:/usr/share/nginx/html:ro
      - ../web/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  pgdata:
  media:
